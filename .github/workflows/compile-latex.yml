name: Compile LaTeX Document
on:
  workflow_dispatch:
    inputs:
      dossier:
        description: 'Chemin du dossier (ex: 25 - 26 6ème/15 - Figures usuelles et aires)'
        required: true
        type: string
      fichier:
        description: 'Nom du fichier .tex (ex: FiguresUsuelles_Aires.tex)'
        required: true
        type: string

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: ${{ inputs.dossier }}
          root_file: ${{ inputs.fichier }}

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Document
          path: ${{ inputs.dossier }}/*.pdf
