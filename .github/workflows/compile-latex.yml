name: Compile LaTeX Document
on:
  workflow_dispatch:
    inputs:
      dossier:
        description: 'Chemin du dossier (ex: 25 - 26 6ème/15 - Figures usuelles et aires)'
        required: true
        type: string
      fichier:
        description: 'Nom du fichier .tex (ex: FiguresUsuelles_Aires.tex)'
        required: true
        type: string

permissions:
  contents: write # <-- INDISPENSABLE : Autorise le robot à enregistrer le PDF dans tes fichiers

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: ${{ inputs.dossier }}
          root_file: ${{ inputs.fichier }}

      - name: Organize, Rename and Push PDF
        run: |
          # 1. Création du dossier "pdf"
          mkdir -p pdf
          
          # 2. Extraction et renommage
          PREMIER_DOSSIER=$(echo "${{ inputs.dossier }}" | cut -d'/' -f1)
          NIVEAU=$(echo "$PREMIER_DOSSIER" | sed 's/25 - 26 //g')
          NOM_BASE=$(basename "${{ inputs.fichier }}" .tex)
          FICHIER_FINAL="pdf/${NIVEAU}_${NOM_BASE}.pdf"
          
          cp "${{ inputs.dossier }}/${NOM_BASE}.pdf" "$FICHIER_FINAL"
          
          # 3. Sauvegarde automatique sur GitHub
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pdf/
          git commit -m "Auto-compilation : ${NIVEAU}_${NOM_BASE}.pdf" || echo "Aucune modification détectée"
          git push
