name: Compile LaTeX Document

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode de compilation'
        required: true
        type: choice
        options:
          - 'Un seul chapitre'
          - 'Tout un niveau'
      niveau:
        description: 'Dossier du niveau (ex: 25 - 26 6eme)'
        required: true
        type: string
      dossier_chapitre:
        description: '[Mode chapitre uniquement] Nom du sous-dossier (ex: 07- Les fractions)'
        required: false
        type: string
      fichier:
        description: '[Mode chapitre uniquement] Nom du fichier .tex (ex: Fractions.tex)'
        required: false
        type: string

permissions:
  contents: write

jobs:

  # ============================================================
  # MODE 1 : Compiler un seul chapitre
  # ============================================================
  compile_un_chapitre:
    name: "Compiler un chapitre"
    if: ${{ inputs.mode == 'Un seul chapitre' }}
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer les fichiers du depot
        uses: actions/checkout@v4

      - name: Compiler le document LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: "${{ inputs.niveau }}/${{ inputs.dossier_chapitre }}"
          root_file: "${{ inputs.fichier }}"

      - name: Verifier que le PDF a bien ete genere
        run: |
          NOM_BASE=$(basename "${{ inputs.fichier }}" .tex)
          PDF_SOURCE="${{ inputs.niveau }}/${{ inputs.dossier_chapitre }}/${NOM_BASE}.pdf"
          if [ ! -f "$PDF_SOURCE" ]; then
            echo "ERREUR : Le PDF '$PDF_SOURCE' est introuvable."
            exit 1
          fi
          echo "OK : PDF genere avec succes : $PDF_SOURCE"

      - name: Organiser, renommer et enregistrer le PDF
        run: |
          mkdir -p pdf
          NIVEAU=$(echo "${{ inputs.niveau }}" | sed 's/^[0-9][0-9] - [0-9][0-9] //')
          NOM_BASE=$(basename "${{ inputs.fichier }}" .tex)
          FICHIER_FINAL="pdf/${NIVEAU}_${NOM_BASE}.pdf"
          cp "${{ inputs.niveau }}/${{ inputs.dossier_chapitre }}/${NOM_BASE}.pdf" "$FICHIER_FINAL"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pdf/
          git commit -m "Compilation : ${NIVEAU}_${NOM_BASE}.pdf" || echo "Aucune modification detectee"
          git push

  # ============================================================
  # MODE 2 : Compiler tous les chapitres d'un niveau
  # ============================================================
  lister_chapitres:
    name: "Lister les chapitres a compiler"
    if: ${{ inputs.mode == 'Tout un niveau' }}
    runs-on: ubuntu-latest
    outputs:
      chapitres: ${{ steps.liste.outputs.chapitres }}
    steps:
      - name: Recuperer les fichiers du depot
        uses: actions/checkout@v4

      - name: Lister les chapitres
        id: liste
        run: |
          JSON="["
          FIRST=1
          while IFS= read -r dossier; do
            FICHIER=$(ls "$dossier"/*.tex 2>/dev/null | xargs -I{} basename {} | grep -v '_' | head -1)
            if [ -z "$FICHIER" ]; then
              FICHIER=$(ls "$dossier"/*.tex 2>/dev/null | xargs -I{} basename {} | head -1)
              echo "AVERTISSEMENT : pas de fichier principal dans $dossier"
            fi
            if [ -n "$FICHIER" ]; then
              if [ $FIRST -eq 0 ]; then JSON="$JSON,"; fi
              JSON="$JSON{\"dossier\":\"$dossier\",\"fichier\":\"$FICHIER\"}"
              FIRST=0
            fi
          done < <(find "${{ inputs.niveau }}" -mindepth 1 -maxdepth 1 -type d | grep -v '/00' | sort)
          JSON="$JSON]"
          echo "chapitres=$JSON" >> $GITHUB_OUTPUT
          echo "Chapitres trouves : $JSON"

  compiler_tous:
    name: "Compiler ${{ matrix.chapitre.fichier }}"
    needs: lister_chapitres
    if: ${{ inputs.mode == 'Tout un niveau' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chapitre: ${{ fromJson(needs.lister_chapitres.outputs.chapitres) }}
      fail-fast: false
    steps:
      - name: Recuperer les fichiers du depot
        uses: actions/checkout@v4

      - name: Compiler ${{ matrix.chapitre.fichier }}
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: "${{ matrix.chapitre.dossier }}"
          root_file: "${{ matrix.chapitre.fichier }}"

      - name: Verifier que le PDF a bien ete genere
        run: |
          NOM_BASE=$(basename "${{ matrix.chapitre.fichier }}" .tex)
          PDF_SOURCE="${{ matrix.chapitre.dossier }}/${NOM_BASE}.pdf"
          if [ ! -f "$PDF_SOURCE" ]; then
            echo "ERREUR : Le PDF '$PDF_SOURCE' est introuvable."
            exit 1
          fi
          echo "OK : PDF genere : $PDF_SOURCE"

      - name: Uploader le PDF comme artifact temporaire
        uses: actions/upload-artifact@v4
        with:
          name: "pdf-${{ matrix.chapitre.fichier }}"
          path: "${{ matrix.chapitre.dossier }}/*.pdf"
          retention-days: 1

  rassembler_pdfs:
    name: "Rassembler et enregistrer tous les PDF"
    needs: compiler_tous
    if: ${{ inputs.mode == 'Tout un niveau' }}
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer les fichiers du depot
        uses: actions/checkout@v4

      - name: Telecharger tous les PDF compiles
        uses: actions/download-artifact@v4
        with:
          path: pdfs_temp/

      - name: Organiser et enregistrer les PDF
        run: |
          mkdir -p pdf
          NIVEAU=$(echo "${{ inputs.niveau }}" | sed 's/^[0-9][0-9] - [0-9][0-9] //')
          for fichier in pdfs_temp/**/*.pdf; do
            NOM_BASE=$(basename "$fichier")
            cp "$fichier" "pdf/${NIVEAU}_${NOM_BASE}"
            echo "Copie : pdf/${NIVEAU}_${NOM_BASE}"
          done < <(find "${{ inputs.niveau }}" -mindepth 1 -maxdepth 1 -type d | grep -v '/00' | sort)
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pdf/
          git commit -m "Compilation complete : ${NIVEAU}" || echo "Aucune modification detectee"
          git push
