name: Compile LaTeX Document
on: [push]
jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: '25 - 26 6ème/15 - Figures usuelles et aires/FiguresUsuelles_Aires.tex'

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Document
          path: '25 - 26 6ème/15 - Figures usuelles et aires/FiguresUsuelles_Aires.pdf'
